<!DOCTYPE html>
<html>
<head>
<title>WebiFutbol - Partido</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{background:black;color:white;font-family:Arial;max-width:1200px;margin:auto;}
h1{text-align:center;color:#00aaff;}
.anuncio{border:1px dashed #555;padding:20px;margin:20px 0;text-align:center;}
  <button onclick="video.load(); video.play();" style="background:#00aaff;color:white;padding:10px;border:0;margin-bottom:10px;">
RECARGAR VIDEO
</button>
video{width:100%;height:600px;background:black;border:1px solid #00aaff;}
</style>
</head>
<body>

<h1>WEBIFUTBOL</h1>

<div class="anuncio">ESPACIO PUBLICITARIO</div>

<video id="video" controls autoplay muted></video>

<div class="anuncio">ESPACIO PUBLICITARIO</div>

<script>
var video = document.getElementById('video');
var videoSrc = 'http://192.168.56.1:8888/live/stream/index.m3u8';

if (Hls.isSupported()) {
  var hls = new Hls();
  hls.loadSource(videoSrc);
  hls.attachMedia(video);
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
  video.src = videoSrc;
}
</script>

</body>
</html>
